<body>
<div class="container-lg px-3 my-5 markdown-body">

    <h1>Merge BPS Files</h1>

    <p>Without a source file. (You won't get checksums, though.)</p>
<p>
    <label for="patch1-picker">Select the first BPS file:</label>

    <input type="file" accept=".bps" id="patch1-picker" name="patch1-picker" />
    <div id="output1"></div>
</p>

    <p>
    <label for="patch2-picker">Select the second BPS file:</label>

    <input type="file" accept=".bps" id="patch2-picker" name="patch2-picker" />
    <div id="output2"></div>
</p>
    
    <button id="submit" onclick="onSubmit()">Merge</button>
</div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/anchor-js/4.1.0/anchor.min.js" integrity="sha256-lZaRhKri35AyJSypXXs4o6OPFTbTmUoltBbDCbdzegg=" crossorigin="anonymous"></script>
<script>anchors.add();</script>
<script src="bps.js"></script>
<script src="BinFile.js"></script>
<script src="HashCalculator.js"></script>
<script>
    "use strict";

    const patch1 = document.getElementById("patch1-picker");
    const patch2 = document.getElementById("patch2-picker");
    const output1 = document.getElementById("output1");
    const output1 = document.getElementById("output2");

    async function onSubmit() {
        bps1 = getBPS(patch1);
        bps2 = getBPS(patch2);
        BPS.merge_without_checksum(bps1, bps2);
    }
  
    async function getBPS(input, output) {
        const files = input.files;
        if (files.length === 0) {
            output.innerHTML = "No file selected. Please try again.";
            return;
        }
        if (files.length > 1) {
            output.innerHTML = "Too many files. This should be impossible. Please contact me.";
            return;
        }
        output.innerHTML = "";
        const file = files[0];
        let bps = undefined;
        const bin = new BinFile(file, () => {
           bps = BPS.fromFile(new BinFile(bin));
        });
        while (!bps) {}
        return bps;
    }
</script>
