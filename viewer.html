<body>
<div class="container-lg px-3 my-5 markdown-body">

    <h1>BPS Viewer</h1>

    <p>With slightly less hex.</p>

    <label for="bps-picker">Select a BPS file:</label>

    <input type="file" accept=".bps" id="bps-picker" name="bps-picker" onchange="onSubmit()"/>

    <div id="output"></div>
</div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/anchor-js/4.1.0/anchor.min.js" integrity="sha256-lZaRhKri35AyJSypXXs4o6OPFTbTmUoltBbDCbdzegg=" crossorigin="anonymous"></script>
<script>anchors.add();</script>
<script src="bps.js"></script>
<script src="BinFile.js"></script>
<script src="HashCalculator.js"></script>
<script>
    "use strict";

    const input = document.getElementById("bps-picker");
    const output = document.getElementById("output");
    async function onSubmit() {
        const files = input.files;
        if (files.length === 0) {
            output.innerHTML = "No file selected. Please try again.";
            return;
        }
        if (files.length > 1) {
            output.innerHTML = "Too many files. This should be impossible. Please contact me.";
            return;
        }
        const file = files[0];
        const bin = new BinFile(file, () => {
            const bps = BPS.fromFile(new BinFile(bin));
            output.innerHTML = bps.fullString();
        });
    }
</script>
